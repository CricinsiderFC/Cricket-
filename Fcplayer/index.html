<head>
  <meta charset="UTF-8">
  <title>HLS Player - Multi Quality</title>
  <meta name="referrer" content="no-referrer">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style type="text/css">
    body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    .video-container {
      position: relative;
      width: 100%;
      height: 100%;
      background-color: #000;
    }

    video {
      width: 100%;
      height: 100%;
      background-color: #000;
    }

    video::-webkit-media-controls {
      display: flex !important;
    }

    video::-webkit-media-controls-panel {
      display: flex !important;
    }

    /* ROTATE BUTTON */
    .rotate-btn {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      background: rgba(0,0,0,0.7);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 8px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
    }

    .rotate-btn:hover {
      background: rgba(255,255,255,0.2);
    }

    #myLogo {
      width: 60px;
      height: 40px;
      position: absolute;
      right: 5px;
      top: 10px;
      z-index: 1000;
      pointer-events: none;
    }

    .quality-panel {
      position: absolute;
      top: 10px;
      right: 70px;
      z-index: 1000;
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      background: rgba(0, 0, 0, 0.7);
      padding: 8px 12px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .quality-btn {
      background: rgba(255,255,255,0.1);
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 15px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s ease;
      min-width: 50px;
      text-align: center;
    }

    .quality-btn:hover {
      background: rgba(255,255,255,0.3);
    }

    .quality-btn.active {
      background: #ff0000;
      color: white;
    }

    .match-info {
      position: absolute;
      bottom: 60px;
      left: 10px;
      z-index: 1000;
      background: rgba(0,0,0,0.7);
      padding: 10px 15px;
      border-radius: 5px;
      font-size: 14px;
      border-left: 3px solid #ff0000;
      max-width: 400px;
    }

    .match-title {
      font-weight: bold;
      margin-bottom: 3px;
      font-size: 16px;
    }

    .match-tournament {
      font-size: 12px;
      opacity: 0.8;
    }

    .custom-loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 16px;
      background: rgba(0,0,0,0.7);
      padding: 15px 25px;
      border-radius: 30px;
      z-index: 2000;
      display: none;
    }

    .custom-loading.visible {
      display: block;
    }

    .error-message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ff4444;
      font-size: 16px;
      background: rgba(0,0,0,0.8);
      padding: 20px 30px;
      border-radius: 10px;
      z-index: 2000;
      text-align: center;
      border: 1px solid #ff4444;
      max-width: 80%;
    }

    @media (max-width: 768px) {
      .quality-panel {
        right: 10px;
        left: 10px;
        top: 10px;
        justify-content: center;
      }

      .match-info {
        bottom: 60px;
        max-width: calc(100% - 20px);
      }
    }
  </style>
</head>

<body>
  <div class="video-container">

    <video id="video" controls autoplay playsinline></video>

    <!-- ROTATE BUTTON -->
    <button class="rotate-btn" onclick="rotateScreen()">⟳ Rotate</button>

    <div id="qualityPanel" class="quality-panel" style="display: none;"></div>

    <div id="matchInfo" class="match-info" style="display: none;">
      <div id="matchTitle" class="match-title"></div>
      <div id="matchTournament" class="match-tournament"></div>
      <div id="matchStatus" class="match-tournament" style="color: #ffaa00;"></div>
    </div>

    <div id="customLoading" class="custom-loading">Loading stream data...</div>
  </div>

<script>

function rotateScreen() {

  const container = document.querySelector('.video-container');

  if (!document.fullscreenElement) {

    if (container.requestFullscreen) {
      container.requestFullscreen();
    } else if (container.webkitRequestFullscreen) {
      container.webkitRequestFullscreen();
    }

    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock("landscape").catch(()=>{});
    }

  } else {

    document.exitFullscreen();

    if (screen.orientation && screen.orientation.unlock) {
      screen.orientation.unlock();
    }

  }

}

</script>

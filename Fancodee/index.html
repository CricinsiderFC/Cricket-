<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fancode WEB</title>
  <link rel="shortcut icon" href="https://fancode.cricsters.io/fancode.webp" />
  <!-- Tailwind + icons -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* ultra light â€” no backdrop, minimal animations */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0f1c;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #edf2f7;
      line-height: 1.5;
    }

    /* spacious card - increased padding, larger height */
    .match-tile {
      background: #131d2f;
      border-radius: 28px;
      border: 1px solid #253247;
      transition: border 0.15s, background 0.15s;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 20px rgba(0,0,0,0.6);
    }
    .match-tile:hover {
      background: #17253b;
      border-color: #3b82f6;
    }

    /* bigger image */
    .match-img-spacious {
      height: 210px;            /* increased height */
      width: 100%;
      object-fit: cover;
      background: #0f1a2c;
      display: block;
    }

    .live-badge-flat {
      background: #b91c1c;
      color: white;
      font-weight: 600;
      font-size: 0.8rem;
      padding: 0.35rem 1rem;
      border-radius: 40px;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      box-shadow: 0 4px 12px rgba(185, 28, 28, 0.4);
    }

    /* watch button only for live */
    .btn-watch-live {
      background: #2563eb;
      border-radius: 50px;
      padding: 0.9rem 1rem;      /* bigger tap area */
      font-weight: 700;
      font-size: 1rem;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      transition: background 0.1s;
      width: 100%;
      border: none;
      margin-top: 0.5rem;
    }
    .btn-watch-live:hover { background: #1d4ed8; }

    .btn-upcoming {
      background: transparent;
      border-radius: 50px;
      padding: 0.9rem 1rem;
      font-weight: 600;
      font-size: 0.95rem;
      color: #94a3b8;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      width: 100%;
      border: 1px solid #334155;
      margin-top: 0.5rem;
      pointer-events: none;
    }

    .skeleton-spacious {
      background: linear-gradient(90deg, #1b2538 25%, #263449 50%, #1b2538 75%);
      background-size: 200% 100%;
      animation: load 1.4s infinite linear;
      border-radius: 28px;
      min-height: 420px;        /* taller skeleton */
    }
    @keyframes load { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .divider-simple { height: 1px; background: #1f2a3c; width: 100%; }

    /* popup overlay â€“ hidden by default */
    #popup-24h {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(3, 7, 18, 0.8);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .popup-card {
      background: #152436;
      border-radius: 48px;
      max-width: 360px;
      width: 90%;
      padding: 2rem 1.8rem;
      border: 1px solid #2e405b;
      box-shadow: 0 30px 50px -10px black;
      text-align: center;
    }
  </style>
</head>
<body class="p-5 max-w-7xl mx-auto">

  <!-- popup (24h snooze) -->
  <div id="popup-24h">
    <div class="popup-card">
      <div class="w-16 h-16 mx-auto bg-blue-600/30 rounded-full flex items-center justify-center text-3xl mb-4">
        <i class="fas fa-bolt text-blue-400"></i>
      </div>
      <h2 class="text-2xl font-bold text-white mb-2">Join Live Alert</h2>
      <p class="text-gray-300 text-sm mb-6">Get Instant Notifications For Every Live Match. No Spam, Only Live Events.</p>
      <div class="flex flex-col gap-3">
        <a href="https://t.me/+e3-eAje291cxNGNl" target="_blank" class="bg-blue-600 hover:bg-blue-500 text-white py-3.5 rounded-full font-semibold flex items-center justify-center gap-2 text-base"><i class="fab fa-telegram-plane"></i> Join Telegram</a>
        <button id="close-popup-btn" class="bg-transparent border border-gray-600 text-gray-300 py-3 rounded-full text-sm hover:bg-gray-800">Already Joined</button>
      </div>
    </div>
  </div>

  <!-- header: Fancode centered with credit -->
  <div class="text-center mt-4 mb-8">
    <div class="inline-flex items-center justify-center gap-3 bg-[#131d2f] py-3 px-7 rounded-full border border-blue-900/50">
      <i class="fas fa-bolt text-blue-500 text-xl"></i>
      <span class="text-3xl font-black tracking-tight text-white">FANCODE</span>
    </div>
    <p class="text-gray-500 text-sm mt-3 tracking-wide">WEB BY MATCHES LINKS</p>
  </div>

  <!-- main grid â€“ spacious cards -->
  <div id="matches-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 mt-6">
    <!-- taller skeletons -->
    <div class="skeleton-spacious"></div>
    <div class="skeleton-spacious hidden sm:block"></div>
    <div class="skeleton-spacious hidden lg:block"></div>
  </div>

  <!-- divider footer -->
  <div class="mt-16 flex items-center gap-3 text-xs text-gray-600">
    <div class="divider-simple"></div>
    <span>Â© fancode Â· clean & fast</span>
    <div class="divider-simple"></div>
  </div>

  <script>
    (function() {
      // anti iframe
      if (window.self !== window.top) {
        document.body.innerHTML = `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0f1c"><div style="background:#151f2f;padding:2rem;border-radius:32px;"><i class="fas fa-shield-alt text-4xl text-red-400"></i><p style="margin-top:1rem;">direct access only</p></div></div>`;
        throw new Error('frame blocked');
      }

      // ---------- 24H POPUP LOGIC ----------
      (function setupPopup() {
        const popup = document.getElementById('popup-24h');
        const closeBtn = document.getElementById('close-popup-btn');
        const POPUP_STORAGE_KEY = 'fancode_popup_24h';

        function shouldShowPopup() {
          const lastClosed = localStorage.getItem(POPUP_STORAGE_KEY);
          if (!lastClosed) return true; // never closed
          const last = parseInt(lastClosed, 10);
          if (isNaN(last)) return true;
          const now = Date.now();
          const hoursPassed = (now - last) / (1000 * 60 * 60);
          return hoursPassed >= 24;
        }

        function markPopupClosed() {
          localStorage.setItem(POPUP_STORAGE_KEY, Date.now().toString());
          popup.style.display = 'none';
        }

        // show popup if needed after a slight delay (to not block rendering)
        window.addEventListener('load', () => {
          setTimeout(() => {
            if (shouldShowPopup()) {
              popup.style.display = 'flex';
            }
          }, 1800); // gentle delay
        });

        if (closeBtn) {
          closeBtn.addEventListener('click', (e) => {
            e.preventDefault();
            markPopupClosed();
          });
        }

        // if user clicks outside popup-card? optional: we can close, but we keep only button to avoid accident.
        // but clicking overlay does nothing â€“ we only close via button to respect 24h.
      })();

      // ---------- MATCHES RENDERING ----------
      const container = document.getElementById('matches-container');
      const DATA_URL = 'https://raw.githubusercontent.com/Jitendra-unatti/fancode/refs/heads/main/data/fancode.json';
      const WATCH_BASE = 'https://matcheslinks-eaa.pages.dev/fancode?id=';

      function getActionButton(matchId, isLive) {
        if (isLive && matchId) {
          const a = document.createElement('a');
          a.href = WATCH_BASE + encodeURIComponent(matchId);
          a.className = 'btn-watch-live';
          a.innerHTML = '<i class="fas fa-play-circle"></i> WATCH NOW';
          a.target = '_blank';
          a.rel = 'noopener';
          return a;
        } else {
          const div = document.createElement('div');
          div.className = 'btn-upcoming';
          div.innerHTML = '<i class="far fa-clock"></i> NOT LIVE';
          return div;
        }
      }

      fetch(DATA_URL)
        .then(res => {
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return res.json();
        })
        .then(data => {
          container.innerHTML = '';

          const matches = (data && Array.isArray(data.matches)) ? data.matches : [];
          if (matches.length === 0) {
            container.innerHTML = `
              <div class="col-span-full text-center py-28 bg-[#131d2f] rounded-3xl">
                <i class="fas fa-calendar-times text-5xl text-gray-500 mb-5"></i>
                <p class="text-2xl font-light text-gray-300">no live matches</p>
                <p class="text-gray-500 text-sm mt-2">check schedule later</p>
              </div>`;
            return;
          }

          const fragment = document.createDocumentFragment();

          matches.forEach(m => {
            const matchId = String(m.match_id || m.id || '');
            const isLive = (m.status || '').toUpperCase() === 'LIVE';

            let imgUrl = m.image || '';
            if (!imgUrl && m.image_cdn) {
              imgUrl = m.image_cdn.APP || m.image_cdn.TATAPLAY || m.image_cdn.PLAYBACK || m.image_cdn.BG_IMAGE || '';
            }
            if (!imgUrl) imgUrl = 'https://www.fancode.com/skillup-uploads/cms-media/Cricket_Fallback_Old_match-card.jpg';

            const title = m.title || 'match';
            const tournament = m.tournament || '';
            const lang = m.language || (m.STREAMING_CDN && m.STREAMING_CDN.language) || '';
            const startTime = m.startTime || '';

            // card â€“ spacious
            const card = document.createElement('div');
            card.className = 'match-tile';

            // image area (taller)
            const imgDiv = document.createElement('div');
            imgDiv.className = 'relative bg-[#0f1a2c]';
            const img = document.createElement('img');
            img.src = imgUrl;
            img.alt = title;
            img.loading = 'lazy';
            img.className = 'match-img-spacious';
            imgDiv.appendChild(img);

            if (isLive) {
              const badge = document.createElement('span');
              badge.className = 'live-badge-flat absolute top-4 left-4';
              badge.innerHTML = '<i class="fas fa-circle text-[0.4rem] text-white mr-1"></i>LIVE';
              imgDiv.appendChild(badge);
            } else {
              const scheduled = document.createElement('span');
              scheduled.className = 'absolute top-4 left-4 bg-black/50 text-white/80 text-[0.7rem] px-3 py-1 rounded-full';
              scheduled.innerHTML = '<i class="far fa-calendar-alt mr-1"></i>scheduled';
              imgDiv.appendChild(scheduled);
            }

            card.appendChild(imgDiv);

            // content â€” more padding
            const content = document.createElement('div');
            content.className = 'p-5 flex flex-col flex-1';

            const titleEl = document.createElement('h3');
            titleEl.className = 'font-bold text-white text-xl leading-tight line-clamp-2'; // bigger font
            titleEl.textContent = title;
            content.appendChild(titleEl);

            // tournament & language chips
            if (tournament || lang) {
              const meta = document.createElement('div');
              meta.className = 'flex flex-wrap gap-2 mt-3 text-sm'; // larger text
              if (tournament) {
                const chip = document.createElement('span');
                chip.className = 'bg-[#1e2c40] text-gray-200 px-3 py-1 rounded-full text-xs';
                chip.textContent = tournament;
                meta.appendChild(chip);
              }
              if (lang) {
                const chipLang = document.createElement('span');
                chipLang.className = 'bg-[#1e2c40] text-gray-200 px-3 py-1 rounded-full text-xs';
                chipLang.innerHTML = '<i class="fas fa-globe mr-1"></i>' + lang;
                meta.appendChild(chipLang);
              }
              content.appendChild(meta);
            }

            if (startTime) {
              const timeRow = document.createElement('div');
              timeRow.className = 'flex items-center text-gray-400 text-sm mt-3';
              timeRow.innerHTML = '<i class="far fa-clock mr-2"></i>' + startTime;
              content.appendChild(timeRow);
            }

            if (isLive) {
              const liveIndicator = document.createElement('div');
              liveIndicator.className = 'flex items-center text-red-400 text-sm mt-2';
              liveIndicator.innerHTML = '<span class="w-2 h-2 bg-red-500 rounded-full mr-2 animate-pulse"></span>LIVE Now';
              content.appendChild(liveIndicator);
            }

            // button (watch only if live)
            content.appendChild(getActionButton(matchId, isLive));

            card.appendChild(content);
            fragment.appendChild(card);
          });

          container.appendChild(fragment);
        })
        .catch(err => {
          console.error(err);
          container.innerHTML = `
            <div class="col-span-full text-center py-28 bg-[#131d2f] rounded-3xl">
              <i class="fas fa-exclamation-triangle text-amber-500 text-5xl mb-5"></i>
              <p class="text-2xl text-gray-200">failed to load</p>
              <p class="text-gray-400 text-sm mt-2">network issue Â· try again</p>
              <button onclick="window.location.reload()" class="mt-8 bg-blue-600 hover:bg-blue-700 text-white px-10 py-4 rounded-full text-base transition"><i class="fas fa-sync-alt mr-2"></i>reload</button>
            </div>`;
        });
    })();
  </script>
</body>
</html>
